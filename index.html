<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Korda VPN</title>
  <style>
    :root {
      --bg: #000;
      --card: #1c1c1f;
      --card-2: #171719;
      --text: #f5f5f7;
      --muted: #8e8e93;
      --muted-2: #5f5f66;
      --accent: #ff3b30;
      --green: #31d158;
      --gold: #c4a22f;
      --line: rgba(255,255,255,.08);
      --radius: 30px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    button, a { font: inherit; }

    .app {
      width: min(100%, 430px);
      min-height: 100svh;
      padding: max(22px, env(safe-area-inset-top)) 24px max(18px, env(safe-area-inset-bottom));
      position: relative;
      overflow: hidden;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding-top: 20px;
      margin-bottom: 74px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(46px, 13vw, 62px);
      line-height: .9;
      letter-spacing: -0.07em;
      font-weight: 900;
    }

    .brand span {
      display: block;
      margin-top: 12px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .plus {
      width: 54px;
      height: 54px;
      border: 0;
      background: transparent;
      color: var(--accent);
      font-size: 58px;
      line-height: 46px;
      font-weight: 200;
      cursor: pointer;
    }

    .main-card {
      min-height: 468px;
      border-radius: var(--radius);
      background: var(--card);
      padding: 28px 26px 24px;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 26px 80px rgba(0,0,0,.38);
    }

    .location {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 32px;
      line-height: 1;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    .location small { font-size: 24px; letter-spacing: 0; }

    .big-logo {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .letter {
      font-size: clamp(180px, 48vw, 230px);
      line-height: .78;
      color: var(--gold);
      font-weight: 1000;
      letter-spacing: -0.13em;
      transform: translateX(-8px);
      filter: drop-shadow(0 18px 20px rgba(0,0,0,.14));
      user-select: none;
    }

    .status {
      margin-top: 26px;
      color: var(--muted);
      font-size: 22px;
      letter-spacing: -0.025em;
      font-weight: 500;
    }

    .status.connected { color: var(--green); }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 48px;
    }

    .dots {
      color: var(--text);
      font-size: 30px;
      line-height: 1;
      letter-spacing: 2px;
      background: transparent;
      border: 0;
      cursor: pointer;
    }

    .power {
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 22px;
      letter-spacing: -0.025em;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      padding: 10px 0;
    }

    .power.on { color: var(--accent); }

    .quick {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .tile {
      border: 0;
      min-height: 100px;
      border-radius: 18px;
      background: var(--card);
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 9px;
      cursor: pointer;
    }

    .tile b { font-size: 22px; line-height: 1; }
    .tile span { color: var(--muted); font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 22px;
    }

    .stat {
      padding: 14px 12px;
      border-radius: 18px;
      background: var(--card-2);
      border: 1px solid var(--line);
    }

    .stat small {
      display: block;
      color: var(--muted-2);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }

    .stat strong {
      display: block;
      font-size: 17px;
      letter-spacing: -0.03em;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: max(16px, env(safe-area-inset-bottom));
      width: min(100% - 48px, 382px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      pointer-events: none;
    }

    .nav-item {
      pointer-events: auto;
      border: 0;
      background: transparent;
      color: var(--muted);
      min-height: 58px;
      display: grid;
      place-items: center;
      gap: 2px;
      cursor: pointer;
    }

    .nav-item b { font-size: 28px; line-height: 1; }
    .nav-item span { font-size: 14px; }
    .nav-item.active { color: #b8b8c0; }

    .sheet {
      position: fixed;
      inset: auto 0 0 0;
      z-index: 50;
      display: none;
      justify-content: center;
      padding: 0 16px max(16px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.72) 24%);
    }

    .sheet.open { display: flex; }

    .sheet-card {
      width: min(100%, 430px);
      border-radius: 28px;
      background: #202024;
      padding: 22px;
      border: 1px solid var(--line);
      box-shadow: 0 -20px 90px rgba(0,0,0,.55);
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .sheet h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .close {
      width: 38px;
      height: 38px;
      border-radius: 99px;
      border: 0;
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
    }

    .list { display: grid; gap: 10px; }

    .row {
      width: 100%;
      min-height: 62px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 13px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      text-align: left;
      cursor: pointer;
    }

    .row div { display: grid; gap: 3px; }
    .row strong { font-size: 17px; }
    .row span { color: var(--muted); font-size: 13px; }

    .primary {
      width: 100%;
      min-height: 56px;
      margin-top: 14px;
      border: 0;
      border-radius: 18px;
      color: #000;
      background: var(--text);
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
    }

    .ghost {
      color: var(--text);
      background: rgba(255,255,255,.08);
    }

    .note {
      margin: 12px 2px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    @media (min-width: 760px) {
      body { align-items: center; min-height: 100vh; }
      .app {
        min-height: 860px;
        border-left: 1px solid var(--line);
        border-right: 1px solid var(--line);
      }
    }

    @media (max-height: 780px) {
      .top { margin-bottom: 36px; }
      .main-card { min-height: 410px; }
      .letter { font-size: 170px; }
      .stats { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <h1>Korda</h1>
        <span>версия 0.1.0</span>
      </div>
      <button class="plus" type="button" onclick="openSheet('config')">+</button>
    </header>

    <section class="main-card">
      <div class="location" id="locationTitle">Германия <small>🇩🇪</small></div>

      <div class="big-logo">
        <div>
          <div class="letter">K</div>
          <div class="status" id="statusText">Отключено</div>
        </div>
      </div>

      <div class="card-bottom">
        <button class="dots" type="button" onclick="openSheet('config')">•••</button>
        <button class="power" id="powerBtn" type="button" onclick="toggleVpn()">ПОДКЛЮЧИТЬ</button>
      </div>
    </section>

    <div class="quick">
      <button class="tile" type="button" onclick="openSheet('location')">
        <b>🌍</b>
        <span>Локация</span>
      </button>
      <button class="tile" type="button" onclick="openSheet('tunnel')">
        <b>⌘</b>
        <span>Туннель</span>
      </button>
      <button class="tile" type="button" onclick="openSheet('support')">
        <b>💬</b>
        <span>Поддержка</span>
      </button>
    </div>

    <div class="stats">
      <div class="stat">
        <small>Статус</small>
        <strong id="statStatus">offline</strong>
      </div>
      <div class="stat">
        <small>Пинг</small>
        <strong id="statPing">—</strong>
      </div>
      <div class="stat">
        <small>Время</small>
        <strong id="statTime">00:00</strong>
      </div>
    </div>

    <nav class="bottom-nav">
      <button class="nav-item active" type="button"><b>🔒</b><span>VPN</span></button>
      <button class="nav-item" type="button" onclick="openSheet('config')"><b>⚙️</b><span>Конфиг</span></button>
      <button class="nav-item" type="button" onclick="openSheet('about')"><b>ⓘ</b><span>О сервисе</span></button>
    </nav>
  </main>

  <div class="sheet" id="sheet" onclick="closeSheet(event)">
    <div class="sheet-card" onclick="event.stopPropagation()">
      <div class="sheet-head">
        <h2 id="sheetTitle">Korda VPN</h2>
        <button class="close" type="button" onclick="closeSheet()">×</button>
      </div>
      <div id="sheetContent"></div>
    </div>
  </div>

  <script>
    const botUrl = 'https://t.me/YOUR_BOT_USERNAME';
    const configUrl = './korda.conf';

    const state = {
      connected: localStorage.getItem('korda_connected') === '1',
      location: localStorage.getItem('korda_location') || 'Германия 🇩🇪',
      tunnel: localStorage.getItem('korda_tunnel') || 'WireGuard',
      startedAt: Number(localStorage.getItem('korda_started_at') || Date.now())
    };

    let timer = null;

    function render() {
      const powerBtn = document.getElementById('powerBtn');
      const statusText = document.getElementById('statusText');
      const statStatus = document.getElementById('statStatus');
      const statPing = document.getElementById('statPing');
      const locationTitle = document.getElementById('locationTitle');

      const [name, flag] = state.location.split(' ');
      locationTitle.innerHTML = `${name} <small>${flag || ''}</small>`;

      if (state.connected) {
        statusText.textContent = 'Подключено';
        statusText.classList.add('connected');
        powerBtn.textContent = 'ОТКЛЮЧИТЬ';
        powerBtn.classList.add('on');
        statStatus.textContent = 'online';
        statPing.textContent = '38 ms';
        startTimer();
      } else {
        statusText.textContent = 'Отключено';
        statusText.classList.remove('connected');
        powerBtn.textContent = 'ПОДКЛЮЧИТЬ';
        powerBtn.classList.remove('on');
        statStatus.textContent = 'offline';
        statPing.textContent = '—';
        document.getElementById('statTime').textContent = '00:00';
        stopTimer();
      }
    }

    function toggleVpn() {
      if (!state.connected) {
        openSheet('connect');
        return;
      }
      state.connected = false;
      localStorage.setItem('korda_connected', '0');
      render();
    }

    function connectDemo() {
      state.connected = true;
      state.startedAt = Date.now();
      localStorage.setItem('korda_connected', '1');
      localStorage.setItem('korda_started_at', String(state.startedAt));
      closeSheet();
      render();
    }

    function startTimer() {
      stopTimer();
      timer = setInterval(() => {
        const sec = Math.floor((Date.now() - state.startedAt) / 1000);
        const m = String(Math.floor(sec / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        document.getElementById('statTime').textContent = `${m}:${s}`;
      }, 1000);
    }

    function stopTimer() {
      if (timer) clearInterval(timer);
      timer = null;
    }

    function setLocation(value) {
      state.location = value;
      localStorage.setItem('korda_location', value);
      closeSheet();
      render();
    }

    function setTunnel(value) {
      state.tunnel = value;
      localStorage.setItem('korda_tunnel', value);
      closeSheet();
    }

    function openSheet(type) {
      const sheet = document.getElementById('sheet');
      const title = document.getElementById('sheetTitle');
      const content = document.getElementById('sheetContent');

      const templates = {
        connect: {
          title: 'Подключение',
          html: `
            <div class="list">
              <button class="row" onclick="connectDemo()">
                <div><strong>Включить демо-статус</strong><span>Покажет состояние подключения на сайте</span></div><span>→</span>
              </button>
              <a class="row" href="${configUrl}" download>
                <div><strong>Скачать конфиг</strong><span>Файл для WireGuard / AmneziaVPN</span></div><span>↓</span>
              </a>
              <a class="row" href="${botUrl}" target="_blank">
                <div><strong>Открыть Telegram</strong><span>Получить QR-код и помощь</span></div><span>↗</span>
              </a>
            </div>
            <p class="note">Сайт не может сам включить VPN в системе. Реальное подключение идёт через WireGuard/AmneziaVPN или через будущее мобильное приложение.</p>
          `
        },
        location: {
          title: 'Локация',
          html: `
            <div class="list">
              <button class="row" onclick="setLocation('Германия 🇩🇪')"><div><strong>Германия 🇩🇪</strong><span>Основной сервер</span></div><span>✓</span></button>
              <button class="row" onclick="setLocation('Нидерланды 🇳🇱')"><div><strong>Нидерланды 🇳🇱</strong><span>Скоро</span></div><span>＋</span></button>
              <button class="row" onclick="setLocation('США 🇺🇸')"><div><strong>США 🇺🇸</strong><span>Скоро</span></div><span>＋</span></button>
            </div>
          `
        },
        tunnel: {
          title: 'Туннель',
          html: `
            <div class="list">
              <button class="row" onclick="setTunnel('WireGuard')"><div><strong>WireGuard</strong><span>Быстрый стандартный режим</span></div><span>✓</span></button>
              <button class="row" onclick="setTunnel('AmneziaWG')"><div><strong>AmneziaWG</strong><span>Режим на будущее</span></div><span>＋</span></button>
            </div>
          `
        },
        support: {
          title: 'Поддержка',
          html: `
            <a class="row" href="${botUrl}" target="_blank"><div><strong>Написать в Telegram</strong><span>Помощь с подключением и конфигом</span></div><span>↗</span></a>
            <button class="primary ghost" onclick="closeSheet()">Закрыть</button>
          `
        },
        config: {
          title: 'Конфиг',
          html: `
            <div class="list">
              <a class="row" href="${configUrl}" download><div><strong>Скачать korda.conf</strong><span>Положим сюда реальный файл после настройки сервера</span></div><span>↓</span></a>
              <a class="row" href="${botUrl}" target="_blank"><div><strong>Получить QR-код</strong><span>Через Telegram-бота</span></div><span>↗</span></a>
            </div>
          `
        },
        about: {
          title: 'Korda VPN',
          html: `
            <div class="list">
              <div class="row"><div><strong>Версия</strong><span>0.1.0 web</span></div><span>beta</span></div>
              <div class="row"><div><strong>Сервер</strong><span>1 нода на старте</span></div><span>soon</span></div>
              <div class="row"><div><strong>Доступ</strong><span>По конфигу и QR-коду</span></div><span>WG</span></div>
            </div>
          `
        }
      };

      const item = templates[type] || templates.about;
      title.textContent = item.title;
      content.innerHTML = item.html;
      sheet.classList.add('open');
    }

    function closeSheet(event) {
      if (event && event.target.id !== 'sheet') return;
      document.getElementById('sheet').classList.remove('open');
    }

    render();
  </script>
</body>
</html>
